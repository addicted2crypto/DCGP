# DCGP governance for Aider.
# https://aider.chat/docs/config/aider_conf.html
#
# The `read` setting injects AGENTS.md into every Aider session so the
# 7-step loop, formula, and "never do this" list are always visible.

read:
  - HARDRULES.md
  - AGENTS.md

# Every Aider commit lands inside a DCGP-governed repo. Keep commits small
# and attributable; Aider's auto-commits should not clobber `.dcgp/` configs.
auto-commits: true
dirty-commits: false
